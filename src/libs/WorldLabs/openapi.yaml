components:
  schemas:
    Content:
      description: >-
        Represents content (media, text, images) that can be stored inline or
        via URL.


        Supports both direct data storage (up to 10MB) and URL references (up to
        20MB).
      properties:
        data_base64:
          anyOf:
            - type: string
            - type: 'null'
          title: Data Base64
        extension:
          anyOf:
            - type: string
            - type: 'null'
          description: File extension without dot
          examples:
            - jpg
            - png
            - pdf
            - txt
          title: Extension
        uri:
          anyOf:
            - type: string
            - type: 'null'
          title: Uri
      title: Content
      type: object
    CreditsResponse:
      description: Remaining credits for the authenticated API user.
      properties:
        remaining_credits:
          description: Remaining API credits available to the authenticated user.
          minimum: 0
          title: Remaining Credits
          type: number
      required:
        - remaining_credits
      title: CreditsResponse
      type: object
    DataBase64Reference:
      description: Reference to content via base64-encoded data.
      properties:
        data_base64:
          description: Base64-encoded content data
          title: Data Base64
          type: string
        extension:
          anyOf:
            - type: string
            - type: 'null'
          description: File extension without dot (e.g., 'jpg', 'png')
          title: Extension
        source:
          const: data_base64
          default: data_base64
          title: Source
          type: string
      required:
        - data_base64
      title: DataBase64Reference
      type: object
    DeleteWorldResponse:
      description: Response from world deletion endpoint.
      properties:
        deleted:
          description: Whether the world was successfully deleted
          title: Deleted
          type: boolean
        world_id:
          description: ID of the deleted world
          title: World Id
          type: string
      required:
        - world_id
        - deleted
      title: DeleteWorldResponse
      type: object
    DepthPanoPrompt:
      description: >-
        For models conditioned on a depth pano and text.

        When depth_pano_image is a log-encoded PNG, z_min and z_max are required

        to decode it correctly. When it is an EXR file containing raw float
        depth

        values, z_min and z_max will both be ignored.

        Please set z_min and z_max both to None when using an EXR file.
      properties:
        depth_pano_image:
          $ref: '#/components/schemas/Content'
        text_prompt:
          anyOf:
            - type: string
            - type: 'null'
          title: Text Prompt
        type:
          const: depth-pano
          default: depth-pano
          title: Type
          type: string
        z_max:
          anyOf:
            - type: number
            - type: 'null'
          title: Z Max
        z_min:
          anyOf:
            - type: number
            - type: 'null'
          title: Z Min
      required:
        - depth_pano_image
      title: DepthPanoPrompt
      type: object
    ExportWorldRequest:
      description: Request to export a generated world asset.
      properties:
        asset_type:
          description: 'Asset family to export: ''splats'' or ''mesh''.'
          enum:
            - splats
            - mesh
          title: Asset Type
          type: string
        format:
          description: Requested export format.
          enum:
            - ply
            - glb
          title: Format
          type: string
        mesh_variant:
          default: textured
          description: Mesh variant to return when an HQ mesh already exists.
          enum:
            - textured
            - vertex_colored
          title: Mesh Variant
          type: string
        resolution:
          default: full_res
          description: Splat resolution to convert when exporting splats as PLY.
          enum:
            - full_res
            - 500k
            - 150k
            - 100k
          title: Resolution
          type: string
      required:
        - asset_type
        - format
      title: ExportWorldRequest
      type: object
    ExportWorldResponse:
      description: Response from world export endpoint.
      properties:
        cost:
          anyOf:
            - $ref: '#/components/schemas/OperationCost'
            - type: 'null'
          description: >-
            Settled credit cost for the operation. Populated only on successful
            completion.
        created_at:
          anyOf:
            - format: date-time
              type: string
            - type: 'null'
          description: Creation timestamp
          title: Created At
        done:
          description: True if the operation is completed
          title: Done
          type: boolean
        error:
          anyOf:
            - $ref: '#/components/schemas/OperationError'
            - type: 'null'
          description: Error information if the operation failed
        expires_at:
          anyOf:
            - format: date-time
              type: string
            - type: 'null'
          description: Expiration timestamp
          title: Expires At
        metadata:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          description: Service-specific metadata, such as progress percentage
          title: Metadata
        operation_id:
          description: Operation identifier
          title: Operation Id
          type: string
        response:
          anyOf:
            - $ref: '#/components/schemas/ExportWorldResult'
            - type: 'null'
          description: >-
            Result payload when done=true and no error. Structure depends on
            operation type.
        updated_at:
          anyOf:
            - format: date-time
              type: string
            - type: 'null'
          description: Last update timestamp
          title: Updated At
      required:
        - operation_id
        - done
      title: ExportWorldResponse
      type: object
    ExportWorldResult:
      description: Downloadable exported world asset.
      properties:
        asset_type:
          description: Exported asset family
          enum:
            - splats
            - mesh
          title: Asset Type
          type: string
        format:
          description: Exported file format
          enum:
            - ply
            - glb
          title: Format
          type: string
        mesh_variant:
          anyOf:
            - enum:
                - textured
                - vertex_colored
              type: string
            - type: 'null'
          description: Mesh variant returned for this export, if applicable
          title: Mesh Variant
        resolution:
          anyOf:
            - type: string
            - type: 'null'
          description: Splat resolution used for this export, if applicable
          title: Resolution
        url:
          description: Download URL for the exported asset
          title: Url
          type: string
      required:
        - asset_type
        - format
        - url
      title: ExportWorldResult
      type: object
    GenerateWorldResponse:
      description: Response from world generation endpoint.
      properties:
        cost:
          anyOf:
            - $ref: '#/components/schemas/OperationCost'
            - type: 'null'
          description: >-
            Settled credit cost for the operation. Populated only on successful
            completion.
        created_at:
          anyOf:
            - format: date-time
              type: string
            - type: 'null'
          description: Creation timestamp
          title: Created At
        done:
          description: True if the operation is completed
          title: Done
          type: boolean
        error:
          anyOf:
            - $ref: '#/components/schemas/OperationError'
            - type: 'null'
          description: Error information if the operation failed
        expires_at:
          anyOf:
            - format: date-time
              type: string
            - type: 'null'
          description: Expiration timestamp
          title: Expires At
        metadata:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          description: Service-specific metadata, such as progress percentage
          title: Metadata
        operation_id:
          description: Operation identifier
          title: Operation Id
          type: string
        response:
          anyOf:
            - {}
            - type: 'null'
          description: >-
            Result payload when done=true and no error. Structure depends on
            operation type.
          title: Response
        updated_at:
          anyOf:
            - format: date-time
              type: string
            - type: 'null'
          description: Last update timestamp
          title: Updated At
      required:
        - operation_id
        - done
      title: GenerateWorldResponse
      type: object
    GetOperationResponse_Union_World__PanoDepthToRgbResult__ExportWorldResult__:
      properties:
        cost:
          anyOf:
            - $ref: '#/components/schemas/OperationCost'
            - type: 'null'
          description: >-
            Settled credit cost for the operation. Populated only on successful
            completion.
        created_at:
          anyOf:
            - format: date-time
              type: string
            - type: 'null'
          description: Creation timestamp
          title: Created At
        done:
          description: True if the operation is completed
          title: Done
          type: boolean
        error:
          anyOf:
            - $ref: '#/components/schemas/OperationError'
            - type: 'null'
          description: Error information if the operation failed
        expires_at:
          anyOf:
            - format: date-time
              type: string
            - type: 'null'
          description: Expiration timestamp
          title: Expires At
        metadata:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          description: Service-specific metadata, such as progress percentage
          title: Metadata
        operation_id:
          description: Operation identifier
          title: Operation Id
          type: string
        response:
          anyOf:
            - $ref: '#/components/schemas/World'
            - $ref: '#/components/schemas/PanoDepthToRgbResult'
            - $ref: '#/components/schemas/ExportWorldResult'
            - type: 'null'
          description: >-
            Result payload when done=true and no error. Structure depends on
            operation type.
          title: Response
        updated_at:
          anyOf:
            - format: date-time
              type: string
            - type: 'null'
          description: Last update timestamp
          title: Updated At
      required:
        - operation_id
        - done
      title: >-
        GetOperationResponse[Union[World, PanoDepthToRgbResult,
        ExportWorldResult]]
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    ImagePrompt:
      description: >-
        Image-to-world generation.


        Generates a world from an image. text_prompt is optional - if not
        provided,

        it will be generated via recaptioning.


        Recommended image formats: jpg, jpeg, png, webp.
      properties:
        disable_recaption:
          anyOf:
            - type: boolean
            - type: 'null'
          description: If True, use text_prompt as-is without recaptioning
          title: Disable Recaption
        image_prompt:
          description: Image content for world generation
          discriminator:
            mapping:
              data_base64: '#/components/schemas/DataBase64Reference'
              media_asset: '#/components/schemas/MediaAssetReference'
              uri: '#/components/schemas/UriReference'
            propertyName: source
          oneOf:
            - $ref: '#/components/schemas/MediaAssetReference'
            - $ref: '#/components/schemas/UriReference'
            - $ref: '#/components/schemas/DataBase64Reference'
          title: Image Prompt
        is_pano:
          $ref: '#/components/schemas/PanoDetectionMode'
          default: auto
          description: >-
            How to treat the image input as a panorama. `auto` detects valid
            equirectangular panoramas, `true` always uses the image as a
            panorama, and `false` treats it as a standard image.
        text_prompt:
          anyOf:
            - type: string
            - type: 'null'
          description: Optional text guidance (auto-generated if not provided)
          title: Text Prompt
        type:
          const: image
          default: image
          title: Type
          type: string
      required:
        - image_prompt
      title: ImagePrompt
      type: object
    ImageryAssets:
      description: Imagery asset URLs.
      properties:
        pano_url:
          anyOf:
            - type: string
            - type: 'null'
          description: Panorama image URL
          title: Pano Url
      title: ImageryAssets
      type: object
    InpaintPanoPrompt:
      description: For models that inpaint the masked portion of a pano image.
      properties:
        pano_image:
          $ref: '#/components/schemas/Content'
        pano_mask:
          $ref: '#/components/schemas/Content'
        text_prompt:
          anyOf:
            - type: string
            - type: 'null'
          title: Text Prompt
        type:
          const: inpaint-pano
          default: inpaint-pano
          title: Type
          type: string
      required:
        - pano_image
        - pano_mask
      title: InpaintPanoPrompt
      type: object
    ListWorldsRequest:
      description: Request to list API-generated worlds with optional filters.
      examples:
        - model: marble-1.0
          page_size: 20
          sort_by: created_at
          status: SUCCEEDED
        - page_size: 50
          sort_by: created_at
          status: SUCCEEDED
          tags:
            - fantasy
            - nature
        - created_after: '2024-01-01T00:00:00Z'
          created_before: '2024-12-31T23:59:59Z'
          page_size: 100
          sort_by: created_at
        - model: marble-1.0-draft
          page_size: 30
          tags:
            - landscape
        - page_size: 20
          page_token: >-
            eyJzbmFwc2hvdF90aW1lIjoiMjAyNC0wMS0wMVQwMDowMDowMFoiLCJsYXN0X2NyZWF0ZWRfYXQiOiIyMDI0LTAxLTAxVDAwOjAwOjAwWiIsImxhc3RfaWQiOiIwMDAwMDAwMC0wMDAwLTAwMDAtMDAwMC0wMDAwMDAwMDAwMDAifQ==
          sort_by: created_at
      properties:
        created_after:
          anyOf:
            - format: date-time
              type: string
            - type: 'null'
          description: Filter worlds created after this timestamp (inclusive)
          title: Created After
        created_before:
          anyOf:
            - format: date-time
              type: string
            - type: 'null'
          description: Filter worlds created before this timestamp (exclusive)
          title: Created Before
        is_public:
          anyOf:
            - type: boolean
            - type: 'null'
          description: Filter by visibility. true=public only, false=private only, null=all
          title: Is Public
        model:
          anyOf:
            - enum:
                - marble-1.0-draft
                - marble-1.0
                - marble-1.1
                - marble-1.1-plus
              type: string
            - enum:
                - Marble 0.1-mini
                - Marble 0.1-plus
                - Marble 1.1-plus
              type: string
            - type: 'null'
          description: >-
            Filter by model used for generation. Legacy names are deprecated;
            use the new lowercase names.
          title: Model
        page_size:
          default: 20
          description: Number of results per page (1-100)
          maximum: 100
          minimum: 1
          title: Page Size
          type: integer
        page_token:
          anyOf:
            - type: string
            - type: 'null'
          description: >-
            Cursor token for pagination (opaque base64 string from previous
            response). Use cursor from next_page_token in previous response for
            consistent pagination.
          title: Page Token
        sort_by:
          default: created_at
          description: Sort results by created_at or updated_at
          enum:
            - created_at
            - updated_at
          title: Sort By
          type: string
        status:
          anyOf:
            - enum:
                - SUCCEEDED
                - PENDING
                - FAILED
                - RUNNING
              type: string
            - type: 'null'
          description: Filter by world status
          title: Status
        tags:
          anyOf:
            - items:
                type: string
              type: array
            - type: 'null'
          description: Filter by tags (returns worlds with ANY of these tags)
          title: Tags
      title: ListWorldsRequest
      type: object
    ListWorldsResponse:
      description: Response containing a list of API-generated worlds.
      properties:
        next_page_token:
          anyOf:
            - type: string
            - type: 'null'
          description: Token for fetching the next page of results
          title: Next Page Token
        worlds:
          description: List of worlds
          items:
            $ref: '#/components/schemas/World'
          title: Worlds
          type: array
      required:
        - worlds
      title: ListWorldsResponse
      type: object
    MediaAsset:
      description: |-
        A user-uploaded media asset stored in managed storage.

        MediaAssets can be images, videos, or binary blobs that are used
        as input to world generation.
      properties:
        created_at:
          description: Creation timestamp
          format: date-time
          title: Created At
          type: string
        extension:
          anyOf:
            - type: string
            - type: 'null'
          description: File extension without dot
          examples:
            - mp4
            - png
            - jpg
          title: Extension
        file_name:
          description: File name
          title: File Name
          type: string
        kind:
          $ref: '#/components/schemas/MediaAssetKind'
          description: High-level media type
          examples:
            - image
            - video
        media_asset_id:
          description: Server-generated media asset identifier
          title: Media Asset Id
          type: string
        metadata:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          description: Optional application-specific metadata
          title: Metadata
        updated_at:
          anyOf:
            - format: date-time
              type: string
            - type: 'null'
          description: Last update timestamp
          title: Updated At
      required:
        - media_asset_id
        - file_name
        - kind
        - created_at
      title: MediaAsset
      type: object
    MediaAssetKind:
      description: High-level media asset type.
      enum:
        - image
        - video
      title: MediaAssetKind
      type: string
    MediaAssetPrepareUploadRequest:
      description: Request to prepare a media asset upload.
      properties:
        extension:
          anyOf:
            - type: string
            - type: 'null'
          description: File extension without dot
          examples:
            - mp4
            - png
            - jpg
          title: Extension
        file_name:
          description: File name
          maxLength: 64
          title: File Name
          type: string
        kind:
          $ref: '#/components/schemas/MediaAssetKind'
          description: High-level media type
          examples:
            - image
            - video
        metadata:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          description: Optional application-specific metadata
          title: Metadata
      required:
        - file_name
        - kind
      title: MediaAssetPrepareUploadRequest
      type: object
    MediaAssetPrepareUploadResponse:
      description: Response from preparing a media asset upload.
      properties:
        media_asset:
