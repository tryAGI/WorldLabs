          - png
          - jpg
          title: Extension
        file_name:
          description: File name
          maxLength: 64
          title: File Name
          type: string
        kind:
          $ref: '#/components/schemas/MediaAssetKind'
          description: High-level media type
          examples:
          - image
          - video
        metadata:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: Optional application-specific metadata
          title: Metadata
      required:
