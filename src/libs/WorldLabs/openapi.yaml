      required:
        - media_asset
        - upload_info
      title: MediaAssetPrepareUploadResponse
      type: object
    MediaAssetReference:
      description: Reference to a previously uploaded MediaAsset.
      properties:
        media_asset_id:
          description: ID of a MediaAsset resource previously created and marked READY
          title: Media Asset Id
          type: string
        source:
          const: media_asset
          default: media_asset
          title: Source
          type: string
      required:
        - media_asset_id
      title: MediaAssetReference
      type: object
    MeshAssets:
      description: Mesh asset URLs.
      properties:
        collider_mesh_url:
          anyOf:
            - type: string
            - type: 'null'
          description: Collider mesh URL
          title: Collider Mesh Url
        full_res_mesh_url:
          anyOf:
            - type: string
            - type: 'null'
          description: Full-resolution vertex-colored mesh URL
          title: Full Res Mesh Url
        hq_mesh_url:
          anyOf:
            - type: string
            - type: 'null'
          description: High-quality textured mesh URL
          title: Hq Mesh Url
      title: MeshAssets
      type: object
    MultiImagePrompt-Input:
      description: |-
        Multi-image-to-world generation.

