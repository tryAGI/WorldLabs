      type: object
    InpaintPanoPrompt:
      description: For models that inpaint the masked portion of a pano image.
      properties:
        pano_image:
          $ref: '#/components/schemas/Content'
        pano_mask:
          $ref: '#/components/schemas/Content'
        text_prompt:
          anyOf:
          - type: string
          - type: 'null'
          title: Text Prompt
        type:
          const: inpaint-pano
          default: inpaint-pano
          title: Type
          type: string
      required:
      - pano_image
      - pano_mask
      title: InpaintPanoPrompt
      type: object
    ListWorldsRequest:
      description: Request to list API-generated worlds with optional filters.
      examples:
      - model: marble-1.0
        page_size: 20
        sort_by: created_at
        status: SUCCEEDED
      - page_size: 50
        sort_by: created_at
        status: SUCCEEDED
        tags:
        - fantasy
        - nature
      - created_after: '2024-01-01T00:00:00Z'
        created_before: '2024-12-31T23:59:59Z'
        page_size: 100
        sort_by: created_at
      - model: marble-1.0-draft
        page_size: 30
        tags:
        - landscape
      - page_size: 20
        page_token: eyJzbmFwc2hvdF90aW1lIjoiMjAyNC0wMS0wMVQwMDowMDowMFoiLCJsYXN0X2NyZWF0ZWRfYXQiOiIyMDI0LTAxLTAxVDAwOjAwOjAwWiIsImxhc3RfaWQiOiIwMDAwMDAwMC0wMDAwLTAwMDAtMDAwMC0wMDAwMDAwMDAwMDAifQ==
        sort_by: created_at
      properties:
        created_after:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          description: Filter worlds created after this timestamp (inclusive)
          title: Created After
        created_before:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          description: Filter worlds created before this timestamp (exclusive)
          title: Created Before
        is_public:
          anyOf:
          - type: boolean
          - type: 'null'
          description: Filter by visibility. true=public only, false=private only,
            null=all
          title: Is Public
        model:
          anyOf:
          - enum:
            - marble-1.0-draft
            - marble-1.0
            - marble-1.1
            - marble-1.1-plus
            type: string
          - enum:
            - Marble 0.1-mini
            - Marble 0.1-plus
            - Marble 1.1-plus
            type: string
          - type: 'null'
          description: Filter by model used for generation. Legacy names are deprecated;
            use the new lowercase names.
          title: Model
        page_size:
          default: 20
          description: Number of results per page (1-100)
          maximum: 100.0
          minimum: 1.0
          title: Page Size
          type: integer
        page_token:
          anyOf:
          - type: string
          - type: 'null'
          description: Cursor token for pagination (opaque base64 string from previous
            response). Use cursor from next_page_token in previous response for consistent
            pagination.
          title: Page Token
        sort_by:
          default: created_at
          description: Sort results by created_at or updated_at
          enum:
          - created_at
          - updated_at
          title: Sort By
          type: string
        status:
          anyOf:
          - enum:
            - SUCCEEDED
            - PENDING
            - FAILED
            - RUNNING
            type: string
          - type: 'null'
          description: Filter by world status
          title: Status
        tags:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: Filter by tags (returns worlds with ANY of these tags)
          title: Tags
      title: ListWorldsRequest
      type: object
    ListWorldsResponse:
      description: Response containing a list of API-generated worlds.
      properties:
        next_page_token:
          anyOf:
          - type: string
          - type: 'null'
          description: Token for fetching the next page of results
          title: Next Page Token
        worlds:
          description: List of worlds
          items:
            $ref: '#/components/schemas/World'
          title: Worlds
          type: array
      required:
      - worlds
      title: ListWorldsResponse
      type: object
    MediaAsset:
