components:
  schemas:
    Content:
      description: 'Represents content (media, text, images) that can be stored inline
        or via URL.


        Supports both direct data storage (up to 10MB) and URL references (up to 20MB).'
      properties:
        data_base64:
          anyOf:
          - type: string
          - type: 'null'
          title: Data Base64
        extension:
          anyOf:
          - type: string
          - type: 'null'
          description: File extension without dot
          examples:
          - jpg
          - png
          - pdf
          - txt
          title: Extension
        uri:
          anyOf:
          - type: string
          - type: 'null'
          title: Uri
      title: Content
      type: object
    DataBase64Reference:
      description: Reference to content via base64-encoded data.
      properties:
        data_base64:
          description: Base64-encoded content data
          title: Data Base64
          type: string
        extension:
          anyOf:
          - type: string
          - type: 'null'
          description: File extension without dot (e.g., 'jpg', 'png')
          title: Extension
        source:
          const: data_base64
          default: data_base64
          title: Source
          type: string
      required:
      - data_base64
      title: DataBase64Reference
      type: object
    DeleteWorldResponse:
      description: Response from world deletion endpoint.
      properties:
        deleted:
          description: Whether the world was successfully deleted
          title: Deleted
          type: boolean
        world_id:
          description: ID of the deleted world
          title: World Id
          type: string
      required:
      - world_id
      - deleted
      title: DeleteWorldResponse
      type: object
    DepthPanoPrompt:
      description: 'For models conditioned on a depth pano and text.

        When depth_pano_image is a log-encoded PNG, z_min and z_max are required

        to decode it correctly. When it is an EXR file containing raw float depth

        values, z_min and z_max will both be ignored.

        Please set z_min and z_max both to None when using an EXR file.'
      properties:
        depth_pano_image:
          $ref: '#/components/schemas/Content'
        text_prompt:
          anyOf:
          - type: string
          - type: 'null'
          title: Text Prompt
        type:
          const: depth-pano
          default: depth-pano
          title: Type
          type: string
        z_max:
          anyOf:
          - type: number
          - type: 'null'
          title: Z Max
        z_min:
          anyOf:
          - type: number
          - type: 'null'
          title: Z Min
      required:
      - depth_pano_image
      title: DepthPanoPrompt
      type: object
    GenerateWorldResponse:
      description: Response from world generation endpoint.
      properties:
        created_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          description: Creation timestamp
          title: Created At
        done:
          description: True if the operation is completed
          title: Done
          type: boolean
        error:
          anyOf:
          - $ref: '#/components/schemas/OperationError'
          - type: 'null'
          description: Error information if the operation failed
        expires_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          description: Expiration timestamp
          title: Expires At
        metadata:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: Service-specific metadata, such as progress percentage
          title: Metadata
        operation_id:
          description: Operation identifier
          title: Operation Id
          type: string
        response:
          anyOf:
          - {}
          - type: 'null'
          description: Result payload when done=true and no error. Structure depends
            on operation type.
          title: Response
        updated_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          description: Last update timestamp
          title: Updated At
      required:
      - operation_id
      - done
      title: GenerateWorldResponse
      type: object
    GetOperationResponse_Union_World__PanoDepthToRgbResult__:
