    PanoDepthToRgbRequest:
      description: >-
        Request to generate an RGB panorama from a depth panorama.


        Provide a depth panorama and a text prompt describing

        the desired appearance. The depth map supplies the

        scene geometry; the model synthesizes textures that

        loosely adhere to that geometry and returns a panoramic RGB image.


        Accepted depth inputs:


        * **EXR**: float depth values. Omit ``z_min``
          and ``z_max``.
        * **PNG**: depth values normalized to [0, 1].
          Provide both ``z_min`` and ``z_max`` so the service
          can decode the PNG correctly.

        For a complete PNG-based workflow, see the

        `web-chisel-depth-png example
        <https://github.com/worldlabsai/worldlabs-api-examples/tree/main/web-chisel-depth-png>`.


        This endpoint returns a long-running ``Operation``.

        Poll ``GET /operations/{operation_id}`` until

        ``done`` is ``true``, then read the generated

        panorama URL from ``response.pano_url``.
      examples:
        - depth_pano_image:
            source: uri
            uri: https://example.com/depth.exr
          text_prompt: >-
            The scene is a warm, rustic cabin interior with a realistic style
            and a cozy winter atmosphere. Wooden walls and exposed beams frame
            the room, while a stone fireplace casts soft amber light across
            simple furnishings and natural textures. The 360 scene is faultless.
        - depth_pano_image:
            source: uri
            uri: https://example.com/greenhouse-depth.exr
          text_prompt: >-
            A peaceful greenhouse workshop filled with plants and glassware,
            with soft sunlight, weathered wood, and ivy creeping along the
            walls.
        - depth_pano_image:
            source: uri
            uri: https://example.com/depth.png
          text_prompt: >-
            The scene is a warm Mediterranean kitchen rendered in a realistic
            style with a bright, welcoming coastal atmosphere. The overall tone
            is relaxed and sunlit, combining natural materials with crisp
            handcrafted details. Blue ceramic tiles wrap the backsplash and
            continue across key architectural surfaces, giving the room a cool
            accent against creamy plaster walls. Wooden cabinetry lines the
            perimeter in a balanced arrangement, with paneled doors, open
            shelving, and brass hardware contributing to the room's refined but
            lived-in character. A broad countertop of pale stone runs between
            the cabinets, creating a continuous work surface that anchors the
            cooking area. A central table with a solid wood top occupies the
            middle of the room, surrounded by simple chairs and small ceramic
            vessels that reinforce the artisanal style. Arched openings connect
            the kitchen to adjacent areas, while French doors admit generous
            daylight and suggest an outdoor terrace nearby. Terracotta accents,
            woven textures, and neatly arranged cookware add visual richness
            without cluttering the space. The cabinetry, tiled surfaces, and
            stone counters form a coherent ring around the room, while the table
            remains the central focal element within the composition. The 360
            scene is faultless.
          z_max: 100
          z_min: 0.1
      properties:
        depth_pano_image:
          description: >-
            Depth panorama image (EXR or PNG). Provide via URI, media_asset, or
            base64 (max 100 MB).
          discriminator:
            mapping:
              data_base64: '#/components/schemas/DataBase64Reference'
              media_asset: '#/components/schemas/MediaAssetReference'
              uri: '#/components/schemas/UriReference'
            propertyName: source
          oneOf:
            - $ref: '#/components/schemas/MediaAssetReference'
            - $ref: '#/components/schemas/UriReference'
            - $ref: '#/components/schemas/DataBase64Reference'
          title: Depth Pano Image
        seed:
          anyOf:
            - maximum: 4294967295
              minimum: 0
              type: integer
            - type: 'null'
          description: Random seed for reproducible generation.
          title: Seed
        text_prompt:
          description: Text description of the desired appearance.
          title: Text Prompt
          type: string
        z_max:
          anyOf:
            - exclusiveMinimum: 0
              type: number
            - type: 'null'
          description: >-
            Maximum depth. Required for PNG depth maps (normalized to [0, 1]).
            Must be provided together with z_min and must be greater than z_min.
            Omit for EXR depth maps.
          title: Z Max
        z_min:
          anyOf:
            - exclusiveMinimum: 0
              type: number
            - type: 'null'
          description: >-
            Minimum depth. Required for PNG depth maps (normalized to [0, 1]).
            Must be provided together with z_max. Omit for EXR depth maps.
          title: Z Min
      required:
        - depth_pano_image
        - text_prompt
      title: PanoDepthToRgbRequest
      type: object
    PanoDepthToRgbResult:
      description: |-
        Result from depth-to-RGB panorama generation.

        Returned inside ``Operation.response`` when the
        operation completes successfully (``done=true``).
      properties:
        pano_url:
          anyOf:
            - type: string
            - type: 'null'
          description: >-
            URL of the generated RGB panorama image. Available when the
            operation succeeds.
          title: Pano Url
      title: PanoDepthToRgbResult
      type: object
    PanoDetectionMode:
      enum:
        - auto
        - true
        - false
    Permission:
      description: Access control permissions for a resource.
      properties:
        allow_id_access:
          default: false
          title: Allow Id Access
          type: boolean
        allowed_readers:
          items:
            type: string
          title: Allowed Readers
          type: array
        allowed_writers:
          items:
            type: string
          title: Allowed Writers
          type: array
        public:
          default: false
          title: Public
          type: boolean
      title: Permission
      type: object
    Prompt:
      description: |-
        For world models generating a world from a single image (+ text).
        Images can be generated using the :image-generation method.
        If no text prompt is provided, it will be generated via recaption.
      properties:
        image_prompt:
          $ref: '#/components/schemas/Content'
        is_pano:
          default: false
          title: Is Pano
          type: boolean
        text_prompt:
          anyOf:
            - type: string
            - type: 'null'
          title: Text Prompt
        type:
          const: image
          default: image
          title: Type
          type: string
      required:
        - image_prompt
      title: Prompt
      type: object
    SphericallyLocatedContent-Input:
      description: Content with a preferred location on the sphere.
      properties:
        azimuth:
          anyOf:
            - type: number
            - type: 'null'
          description: Azimuth angle in degrees
          title: Azimuth
        content:
          description: The content at this location
          discriminator:
            mapping:
              data_base64: '#/components/schemas/DataBase64Reference'
              media_asset: '#/components/schemas/MediaAssetReference'
              uri: '#/components/schemas/UriReference'
            propertyName: source
          oneOf:
            - $ref: '#/components/schemas/MediaAssetReference'
            - $ref: '#/components/schemas/UriReference'
            - $ref: '#/components/schemas/DataBase64Reference'
          title: Content
      required:
        - content
      title: SphericallyLocatedContent
      type: object
    SphericallyLocatedContent-Output:
      description: Content with a preferred location on the sphere.
      properties:
        azimuth:
          anyOf:
            - type: number
            - type: 'null'
          title: Azimuth
        data_base64:
          anyOf:
            - type: string
            - type: 'null'
          title: Data Base64
        extension:
          anyOf:
            - type: string
            - type: 'null'
          description: File extension without dot
          examples:
            - jpg
            - png
            - pdf
            - txt
          title: Extension
        uri:
          anyOf:
            - type: string
            - type: 'null'
          title: Uri
      title: SphericallyLocatedContent
      type: object
    SplatAssets:
      description: Gaussian splat asset URLs.
      properties:
        semantics_metadata:
          anyOf:
            - $ref: '#/components/schemas/WorldSemanticsMetadata'
            - type: 'null'
          description: Semantic metadata for the world
        spz_urls:
          anyOf:
            - additionalProperties:
                type: string
              type: object
            - type: 'null'
          description: URLs for SPZ format Gaussian splat files
          title: Spz Urls
      title: SplatAssets
      type: object
    UploadUrlInfo:
      description: Information required to upload raw bytes directly to storage.
      properties:
        curl_example:
          anyOf:
            - type: string
            - type: 'null'
          description: Optional curl example for convenience
          title: Curl Example
        required_headers:
          anyOf:
            - additionalProperties:
                type: string
              type: object
            - type: 'null'
          description: Headers that MUST be included when uploading (e.g. Content-Type)
          title: Required Headers
        upload_method:
          description: Upload method
          title: Upload Method
          type: string
        upload_url:
          description: Signed URL for uploading bytes via PUT
          title: Upload Url
          type: string
      required:
        - upload_url
        - upload_method
      title: UploadUrlInfo
      type: object
    UriReference:
      description: Reference to content via a publicly accessible URL.
      properties:
        source:
          const: uri
          default: uri
          title: Source
          type: string
        uri:
          description: Publicly accessible URL pointing to the media
          title: Uri
          type: string
      required:
        - uri
      title: UriReference
      type: object
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
              - type: string
              - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
        - loc
        - msg
        - type
      title: ValidationError
      type: object
    VideoPrompt-Input:
      description: |-
        Video-to-world generation.

        Generates a world from a video. text_prompt is optional.

        Recommended video formats: mp4, webm, mov, avi.
        Maximum video size: 100MB.
      properties:
        disable_recaption:
          anyOf:
            - type: boolean
            - type: 'null'
          description: If True, use text_prompt as-is without recaptioning
          title: Disable Recaption
        text_prompt:
          anyOf:
            - type: string
            - type: 'null'
          description: Optional text guidance (auto-generated if not provided)
          title: Text Prompt
        type:
          const: video
          default: video
          title: Type
          type: string
        video_prompt:
          description: Video content for world generation
          discriminator:
            mapping:
              data_base64: '#/components/schemas/DataBase64Reference'
              media_asset: '#/components/schemas/MediaAssetReference'
              uri: '#/components/schemas/UriReference'
            propertyName: source
          oneOf:
            - $ref: '#/components/schemas/MediaAssetReference'
            - $ref: '#/components/schemas/UriReference'
            - $ref: '#/components/schemas/DataBase64Reference'
          title: Video Prompt
      required:
        - video_prompt
      title: VideoPrompt
      type: object
    VideoPrompt-Output:
      description: For world models supporting video (+ text) input.
      properties:
        text_prompt:
          anyOf:
            - type: string
            - type: 'null'
          title: Text Prompt
        type:
          const: video
          default: video
          title: Type
          type: string
        video_prompt:
          $ref: '#/components/schemas/Content'
      required:
        - video_prompt
      title: VideoPrompt
      type: object
    World:
      description: A generated world, including asset URLs.
      properties:
        assets:
          anyOf:
            - $ref: '#/components/schemas/WorldAssets'
            - type: 'null'
          description: Generated world assets
        created_at:
          anyOf:
            - format: date-time
              type: string
            - type: 'null'
          description: Creation timestamp
          title: Created At
        display_name:
          description: Display name
          title: Display Name
          type: string
        model:
          anyOf:
            - type: string
            - type: 'null'
          description: Model used for generation
          title: Model
        permission:
          anyOf:
            - $ref: '#/components/schemas/Permission'
            - type: 'null'
          description: Access control permissions for the world
        tags:
          anyOf:
            - items:
                type: string
              type: array
            - type: 'null'
          description: Tags associated with the world
          title: Tags
        updated_at:
          anyOf:
            - format: date-time
              type: string
            - type: 'null'
          description: Last update timestamp
          title: Updated At
        world_id:
          description: World identifier
          title: World Id
          type: string
        world_marble_url:
          description: World Marble URL
          title: World Marble Url
          type: string
        world_prompt:
          anyOf:
            - discriminator:
                mapping:
                  depth-pano: '#/components/schemas/DepthPanoPrompt'
                  image: '#/components/schemas/Prompt'
                  inpaint-pano: '#/components/schemas/InpaintPanoPrompt'
                  multi-image: '#/components/schemas/MultiImagePrompt-Output'
                  text: '#/components/schemas/WorldTextPrompt-Output'
                  video: '#/components/schemas/VideoPrompt-Output'
                propertyName: type
              oneOf:
                - $ref: '#/components/schemas/WorldTextPrompt-Output'
                - $ref: '#/components/schemas/Prompt'
                - $ref: '#/components/schemas/MultiImagePrompt-Output'
                - $ref: '#/components/schemas/VideoPrompt-Output'
                - $ref: '#/components/schemas/DepthPanoPrompt'
                - $ref: '#/components/schemas/InpaintPanoPrompt'
            - type: 'null'
          description: World prompt
          title: World Prompt
      required:
        - world_id
        - display_name
        - world_marble_url
      title: World
      type: object
    WorldAssets:
      description: Downloadable outputs of world generation.
      properties:
        caption:
          anyOf:
            - type: string
            - type: 'null'
          description: AI-generated description of the world
          title: Caption
        imagery:
          anyOf:
            - $ref: '#/components/schemas/ImageryAssets'
            - type: 'null'
          description: Imagery assets
        mesh:
          anyOf:
            - $ref: '#/components/schemas/MeshAssets'
            - type: 'null'
          description: Mesh assets
        splats:
          anyOf:
            - $ref: '#/components/schemas/SplatAssets'
            - type: 'null'
          description: Gaussian splat assets
        thumbnail_url:
          anyOf:
            - type: string
            - type: 'null'
          description: Thumbnail URL for the world
          title: Thumbnail Url
      title: WorldAssets
      type: object
    WorldSemanticsMetadata:
      description: |-
        Semantic metadata describing how to interpret the generated splat
        asset in real-world units.

        The exported asset is in arbitrary model units. Apply the transform
        below to convert to a metric, ground-aligned frame:

            metric_xyz = raw_xyz * metric_scale_factor
            aligned_xyz = metric_xyz - (0, ground_plane_offset, 0)

        Both fields are populated on every world generated by the current
        pipeline. They remain Optional only for backwards compatibility with
        worlds generated before December 2025, which predate metric-scale
        estimation.

        TODO: once pre-December-2025 worlds are migrated or aged out, tighten
        these fields to non-Optional and drop the `| None` from the type.
      properties:
        ground_plane_offset:
          anyOf:
            - type: number
            - type: 'null'
          description: >-
            Vertical (Y-axis) offset, in meters, of the detected ground plane in
            the metric-scaled frame. Subtract from Y after applying
            `metric_scale_factor` to place the ground at y=0.
          title: Ground Plane Offset
        metric_scale_factor:
          anyOf:
            - type: number
            - type: 'null'
          description: >-
            Multiplicative factor that converts raw asset coordinates to meters.
            Multiply all XYZ positions (and isotropic scales) by this value. A
            value of 1.0 means scale could not be inferred and the asset was
            left in model units.
          title: Metric Scale Factor
      title: WorldSemanticsMetadata
      type: object
    WorldTextPrompt-Input:
      description: |-
        Text-to-world generation.

        Generates a world from a text description. text_prompt is REQUIRED.
      properties:
        disable_recaption:
          anyOf:
            - type: boolean
            - type: 'null'
          description: If True, use text_prompt as-is without recaptioning
          title: Disable Recaption
        text_prompt:
          anyOf:
            - type: string
            - type: 'null'
          description: Optional text guidance (auto-generated if not provided)
          title: Text Prompt
        type:
          const: text
          default: text
          title: Type
          type: string
      title: WorldTextPrompt
      type: object
    WorldTextPrompt-Output:
      description: Input prompt class for text-conditioned world generation.
      properties:
        text_prompt:
          anyOf:
            - type: string
            - type: 'null'
          title: Text Prompt
        type:
          const: text
          default: text
          title: Type
          type: string
      title: WorldTextPrompt
      type: object
    WorldsGenerateRequest:
      description: >-
        Request to generate a world from text, image, multi-image, or video
        input.
      examples:
        - display_name: Coastal Castle
          model: marble-1.0
          permission:
            public: false
          seed: 42
          tags:
            - fantasy
            - coastal
          world_prompt:
            text_prompt: >-
              A grand, ivy-covered castle rises from the shoreline at sunset,
              its reflection shimmering in the tranquil ocean waves.
            type: text
        - display_name: Greenhouse Workshop
          model: marble-1.0-draft
          world_prompt:
            image_prompt:
              source: uri
              uri: https://example.com/my-image.jpg
            text_prompt: >-
              A peaceful, sunlit greenhouse workshop filled with plants and
              glassware, where soft light filters through cracked windows and
              ivy creeps along the walls.
            type: image
        - display_name: World from an Existing Pano
          model: marble-1.1
          world_prompt:
            image_prompt:
              source: uri
              uri: https://example.com/my-equirect-pano.jpg
            is_pano: auto
            type: image
        - permission:
            public: true
          world_prompt:
            type: video
            video_prompt:
              media_asset_id: 550e8400e29b41d4a716446655440000
              source: media_asset
        - display_name: World from Multiple Images
          model: marble-1.1
          world_prompt:
            multi_image_prompt:
              - azimuth: 0
                content:
                  source: uri
                  uri: https://example.com/image1.jpg
              - azimuth: 180
                content:
                  source: uri
                  uri: https://example.com/image2.jpg
            type: multi-image
      properties:
        display_name:
          anyOf:
            - maxLength: 64
              type: string
            - type: 'null'
          description: >-
            Optional human-readable title for the world (max 64 characters).
            Stored as world metadata and returned in world responses; does not
            affect generation. If omitted, World Labs may generate a title from
            the prompt.
          title: Display Name
        model:
          anyOf:
            - enum:
                - marble-1.0-draft
                - marble-1.0
                - marble-1.1
                - marble-1.1-plus
              type: string
            - enum:
                - Marble 0.1-mini
                - Marble 0.1-plus
                - Marble 1.1-plus
              type: string
          default: marble-1.1
          description: >-
            The model to use for generation. marble-1.1-plus includes dynamic
            world sizing. Legacy names ('Marble 0.1-plus', etc.) still work but
            are deprecated and will be removed in a future release.
          title: Model
        permission:
          $ref: '#/components/schemas/Permission'
          default:
            allow_id_access: false
            allowed_readers: []
            allowed_writers: []
            public: false
          description: The permission for the world
        seed:
          anyOf:
            - maximum: 4294967295
              minimum: 0
              type: integer
            - type: 'null'
          description: Random seed for generation
          title: Seed
        tags:
          anyOf:
            - items:
                type: string
              maxItems: 10
              type: array
            - type: 'null'
          description: Optional tags for the world (max 10 tags, each up to 32 characters)
          title: Tags
        world_prompt:
          description: The prompt specifying how to generate the world
          discriminator:
            mapping:
              image: '#/components/schemas/ImagePrompt'
              multi-image: '#/components/schemas/MultiImagePrompt-Input'
              text: '#/components/schemas/WorldTextPrompt-Input'
              video: '#/components/schemas/VideoPrompt-Input'
            propertyName: type
          oneOf:
            - $ref: '#/components/schemas/WorldTextPrompt-Input'
            - $ref: '#/components/schemas/ImagePrompt'
            - $ref: '#/components/schemas/MultiImagePrompt-Input'
            - $ref: '#/components/schemas/VideoPrompt-Input'
          title: World Prompt
      required:
        - world_prompt
      title: WorldsGenerateRequest
      type: object
  securitySchemes:
    ApiKeyAuth:
      description: API key for authentication. Get your key from the developer portal.
      in: header
      name: WLT-Api-Key
      type: apiKey
info:
  description: Public-facing API for the Marble platform
  summary: Marble Public API v1
  title: Marble Public API v1
  version: 1.0.0
openapi: 3.1.0
paths:
  /marble/v1/credits:
    get:
      description: |-
        Get remaining API credits for the authenticated user.

        Returns:
            CreditsResponse with the current aggregate API credit balance.

        Raises:
            HTTPException: 404 if the caller is not an API-enabled user
            HTTPException: 503 if the billing backend is unavailable
      operationId: get_credits_marble_v1_credits_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditsResponse'
          description: Successful Response
      summary: Get Credits
      tags:
        - credits
  /marble/v1/media-assets/{media_asset_id}:
    get:
      description: |-
        Get a media asset by ID.

        Retrieves metadata for a previously created media asset.

        Args:
            media_asset_id: The media asset identifier.

        Returns:
            MediaAsset object with media_asset_id, file_name, extension, kind,
            metadata, created_at, and updated_at.

        Raises:
            HTTPException: 404 if not found
      operationId: get_media_asset_marble_v1_media_assets__media_asset_id__get
      parameters:
        - in: path
          name: media_asset_id
          required: true
          schema:
            title: Media Asset Id
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAsset'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Media Asset
  /marble/v1/media-assets:prepare_upload:
    post:
      description: >-
        Prepare a media asset upload for use in world generation.


        This API endpoint creates a media asset record and returns a signed
        upload URL.

        Use this workflow to upload images or videos that you want to reference
        in world

        generation requests.


        ## Workflow


        1. **Prepare Upload** (this endpoint): Get a `media_asset_id` and
        `upload_url`

        2. **Upload File**: Use the signed URL to upload your file

        3. **Generate World**: Reference the `media_asset_id` in
        `/worlds:generate` with
           source type "media_asset"

        ## Request Parameters


        - `file_name`: Your file's name (e.g., "landscape.jpg")

        - `extension`: File extension without dot (e.g., "jpg", "png", "mp4")

        - `kind`: Either "image" or "video"

        - `metadata`: Optional custom metadata object


        ## Response


        Returns a `MediaAssetPrepareUploadResponse` containing:


        - `media_asset`: Object with `media_asset_id` (use this in world
        generation)

        - `upload_info`: Object with `upload_url`, `required_headers`, and
        `curl_example`


        ## Uploading Your File


        Use the returned `upload_url` and `required_headers` to upload your
        file:


        ```bash

        curl --request PUT \
          --url <upload_url> \
          --header "Content-Type: <content-type>" \
          --header "<header-name>: <header-value>" \
          --upload-file /path/to/your/file
        ```


        Replace:

        - `<upload_url>`: The `upload_url` from the response

        - `<content-type>`: MIME type (e.g., `image/png`, `image/jpeg`,
        `video/mp4`)

        - `<header-name>: <header-value>`: Each header from `required_headers`

        - `/path/to/your/file`: Path to your local file


        ## Example Usage in World Generation


        After uploading, use the `media_asset_id` in a world generation request:


        ```json

        {
          "world_prompt": {
            "type": "image",
            "image_prompt": {
              "source": "media_asset",
              "media_asset_id": "<your-media-asset-id>"
            }
          }
        }

        ```
      operationId: prepare_media_asset_upload_marble_v1_media_assets_prepare_upload_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MediaAssetPrepareUploadRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAssetPrepareUploadResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Prepare a media asset upload
  /marble/v1/operations/{operation_id}:
    get:
      description: |-
        Get an operation by ID.

        Poll this endpoint to check the status of a long-running operation.
        When done=true, the response field contains the generated world.

        Args:
            operation_id: The operation identifier from /worlds:generate.

        Returns:
            GetOperationResponse[World] with:
                - operation_id: Operation identifier
                - created_at: Creation timestamp
                - updated_at: Last update timestamp
                - expires_at: Expiration timestamp
                - done: true when complete, false while in progress
                - error: Error details if failed, null otherwise
                - metadata: Progress information and world_id
                - response: Generated World if done=true, null otherwise
                - cost: Settled credit cost breakdown; populated only when the
                  operation completed successfully (done=true with no error)
                  and a public price is known for its operation type. Failed
                  or in-progress operations return null.

        Raises:
            HTTPException: 401 if unauthorized
            HTTPException: 404 if operation not found
            HTTPException: 500 if request fails
      operationId: get_operation_marble_v1_operations__operation_id__get
      parameters:
        - in: path
          name: operation_id
          required: true
          schema:
            title: Operation Id
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/GetOperationResponse_Union_World__PanoDepthToRgbResult__ExportWorldResult__
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Operation
  /marble/v1/pano:depth_to_rgb:
    post:
      description: >-
        Generate an RGB panorama from a depth panorama.


        Provide a depth panorama and a text prompt

        describing the desired appearance. The depth map

        supplies the scene geometry; the model synthesizes

        textures that match that geometry and returns a

        panoramic RGB image.


        Accepted depth inputs:


        * **EXR**: float depth values. Omit
          ``z_min`` and ``z_max``.
        * **PNG**: depth values normalized to [0, 1].
          Provide both ``z_min`` and ``z_max`` so the
          service can decode the PNG correctly.

        For a complete PNG-based workflow, see the

        [web-chisel-depth-png
        example](https://github.com/worldlabsai/worldlabs-api-examples/tree/main/web-chisel-depth-png).


        Returns a long-running ``Operation``. Poll

        ``GET /operations/{operation_id}`` until

        ``done`` is ``true``, then read the generated

        panorama URL from ``response.pano_url``.


        Raises:
            HTTPException: 400 if invalid request
            HTTPException: 402 if insufficient credits
            HTTPException: 500 if generation could not start
      operationId: pano_depth_to_rgb_marble_v1_pano_depth_to_rgb_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PanoDepthToRgbRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation_PanoDepthToRgbResult_'
          description: Successful Response
        '402':
          content:
            application/json:
              example:
                detail: >-
                  Insufficient API credits to start this request. Add credits or
                  enable auto-refill at https://platform.worldlabs.ai/billing.
          description: The account has insufficient API credits for this request.
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Pano Depth To Rgb
  /marble/v1/worlds/{world_id}:
    delete:
      description: |-
        Delete a world by ID.

        Permanently deletes a world and its associated assets.
        Only the world owner can delete a world.

        Args:
            world_id: The unique identifier of the world to delete.

        Returns:
            DeleteWorldResponse confirming the deletion.

        Raises:
            HTTPException: 403 if user is not the world owner
            HTTPException: 404 if world not found
            HTTPException: 500 if deletion fails
      operationId: delete_world_marble_v1_worlds__world_id__delete
      parameters:
        - in: path
          name: world_id
          required: true
          schema:
            title: World Id
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteWorldResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Delete World
    get:
      description: >-
        Get a world by ID.


        Retrieves a world's details including generated assets if available.

        Only the world owner or users with access to public worlds can retrieve
        them.


        Args:
            world_id: The unique identifier of the world.

        Returns:
            World object with world_id, display_name, tags, assets, created_at,
            updated_at, permission, model, world_prompt, and world_marble_url.

        Raises:
            HTTPException: 404 if world not found or access denied
      operationId: get_world_marble_v1_worlds__world_id__get
      parameters:
        - in: path
          name: world_id
          required: true
          schema:
            title: World Id
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/World'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get World
